name: Build, test and publish docker images

# One workflow, three behaviors:
#   pull_request      -> build + test, never push
#   push to master    -> build + test + push :development[-<flavour>]
#   release published -> build + test + push :<release tag>[-<flavour>]
#   workflow_dispatch -> build + test, never push (safe manual run)
#
# cc-dask-alma9 and cc-analysis-alma9 are each built against every coffea base
# flavour (noml / dak / full / 0.7). The base image, its flavour label and the
# base's python minor version are passed as build-args; package sets live in
# docker/env/casa-*.yaml. The "canonical" flavour additionally publishes the
# bare, un-suffixed tag so existing consumers keep resolving.
on:
  pull_request:
    paths:
      - docker/**
    branches:
      - master
  push:
    paths:
      - docker/**
    branches:
      - master
  release:
    types:
      - published
  workflow_dispatch:

env:
  PROJECT: 'coffea-casa'
  REGISTRY: 'hub.opensciencegrid.org'

jobs:
  matrix-build:
    strategy:
      fail-fast: false
      matrix:
        # Enumerated (not a cartesian product) so combine images can stay
        # single-base and so spawntest can be enabled per-entry.
        include:
          # ---- cc-dask-alma9 across all coffea flavours -----------------
          - { image: cc-dask-alma9, flavour: noml, base_image: "coffeateam/coffea-almalinux9-noml:2026.7.0-py3.12", pyver: "3.12", canonical: true,  singleuser: true,  spawntest: true  }
          - { image: cc-dask-alma9, flavour: dak,  base_image: "coffeateam/coffea-dak-almalinux9:2026.7.0-py3.12",  pyver: "3.12", canonical: false, singleuser: true,  spawntest: false }
          - { image: cc-dask-alma9, flavour: full, base_image: "coffeateam/coffea-almalinux9:2026.7.0-py3.12",      pyver: "3.12", canonical: false, singleuser: true,  spawntest: false }
          - { image: cc-dask-alma9, flavour: "0.7", base_image: "coffeateam/coffea-0.7-almalinux9:0.7.31-py3.11",   pyver: "3.11", canonical: false, singleuser: true,  spawntest: false }
          # ---- cc-analysis-alma9 (slim) across all coffea flavours ------
          - { image: cc-analysis-alma9, flavour: noml, base_image: "coffeateam/coffea-almalinux9-noml:2026.7.0-py3.12", pyver: "3.12", canonical: true,  singleuser: false, spawntest: false }
          - { image: cc-analysis-alma9, flavour: dak,  base_image: "coffeateam/coffea-dak-almalinux9:2026.7.0-py3.12",  pyver: "3.12", canonical: false, singleuser: false, spawntest: false }
          - { image: cc-analysis-alma9, flavour: full, base_image: "coffeateam/coffea-almalinux9:2026.7.0-py3.12",      pyver: "3.12", canonical: false, singleuser: false, spawntest: false }
          - { image: cc-analysis-alma9, flavour: "0.7", base_image: "coffeateam/coffea-0.7-almalinux9:0.7.31-py3.11",   pyver: "3.11", canonical: false, singleuser: false, spawntest: false }
          # ---- combine images: single base baked into their Dockerfile --
          - { image: cc-dask-combine-alma9,     flavour: "", base_image: "", pyver: "3.12", canonical: false, singleuser: true,  spawntest: false }
          - { image: cc-analysis-combine-alma9, flavour: "", base_image: "", pyver: "3.12", canonical: false, singleuser: false, spawntest: false }
    name: ${{ matrix.image }} ${{ matrix.flavour }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # ----------------------------------------------------------------
      # Tag generation, unified for all event types.
      # Flavoured images get a -<flavour> suffix; the canonical flavour
      # additionally gets the bare tag. Combine images (empty flavour) get
      # the bare tag only.
      # ----------------------------------------------------------------
      - name: Generate tags
        id: tags
        env:
          image: ${{ env.REGISTRY }}/coffea-casa/${{ matrix.image }}
          release: ${{ github.event.release.tag_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          FLAVOUR: ${{ matrix.flavour }}
          CANONICAL: ${{ matrix.canonical }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" == "release" ]; then
            releasetag="${release}"
            push="true"
          elif [ "${GITHUB_EVENT_NAME}" == "push" ]; then
            releasetag="development"
            push="true"
          else
            # pull_request / workflow_dispatch: test-only, never published
            releasetag="ci-${GITHUB_SHA::12}"
            push="false"
          fi

          if [ -n "${FLAVOUR}" ]; then
            primarytag="${releasetag}-${FLAVOUR}"
            tags="${image}:${primarytag}"
            if [ "${CANONICAL}" == "true" ]; then
              tags="${tags},${image}:${releasetag}"
            fi
          else
            primarytag="${releasetag}"
            tags="${image}:${releasetag}"
          fi

          echo "Event=${GITHUB_EVENT_NAME} flavour=${FLAVOUR:-<none>} tags=${tags} push=${push}"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "primarytag=${primarytag}" >> "$GITHUB_OUTPUT"
          echo "releasetag=${releasetag}" >> "$GITHUB_OUTPUT"
          echo "push=${push}" >> "$GITHUB_OUTPUT"

      - name: Check out code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        run: |
          curl -fsSLo hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          ./hadolint docker/Dockerfile.${{ matrix.image }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver-opts: network=host

      - name: Install dependencies
        env:
          YARN_CACHE_FOLDER: /tmp/yarn-cache
        run: yarn install

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false       # ~8-10 GB of preinstalled language runtimes
          docker-images: false    # keep your built image!
          large-packages: true
          swap-storage: true

      # ----------------------------------------------------------------
      # Build ONCE into the local daemon, under the final tag.
      # Everything below tests exactly the bytes that get published.
      # Cache scope keys on image+flavour so flavours don't share layers.
      # ----------------------------------------------------------------
      - name: Build image (load locally for testing)
        uses: docker/build-push-action@v6
        with:
          context: docker/
          file: docker/Dockerfile.${{ matrix.image }}
          load: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.flavour }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.flavour }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            FLAVOUR=${{ matrix.flavour }}
            PYVER=${{ matrix.pyver }}
            TAG=${{ steps.tags.outputs.releasetag }}
            PROJECT=${{ env.PROJECT }}
            GITHUB_ACTIONS=true
            REGISTRY=${{ env.REGISTRY }}

      # ----------------------------------------------------------------
      # Test layers (singleuser images only). Uses the primary (possibly
      # flavoured) tag so the right build is exercised.
      # ----------------------------------------------------------------
      - name: Install container-structure-test
        if: matrix.singleuser
        run: |
          curl -fsSLo container-structure-test \
            https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64
          chmod +x container-structure-test
          sudo mv container-structure-test /usr/local/bin/container-structure-test

      - name: Run structure tests
        if: matrix.singleuser
        run: |
          container-structure-test test \
            --image "${{ env.REGISTRY }}/coffea-casa/${{ matrix.image }}:${{ steps.tags.outputs.primarytag }}" \
            --config ci/structure-tests.yaml

      - name: Run pytest smoke tests inside the image
        if: matrix.singleuser
        run: |
          docker run --rm -e COFFEA_CASA_IMAGE_TESTS=1 -v "$PWD/tests:/tests:ro" \
            "${{ env.REGISTRY }}/coffea-casa/${{ matrix.image }}:${{ steps.tags.outputs.primarytag }}" \
            bash -c "pip install --no-cache-dir --quiet --user pytest && \
                     python -m pytest /tests -v --color=yes -p no:cacheprovider"

      - name: Boot notebook server and probe it
        if: matrix.singleuser
        run: |
          mkdir -p ci-dask
          # Disable the auto-started default cluster; we test HTTP serving only.
          # Cluster startup is covered by the kind spawn test with real secrets.
          printf 'labextension:\n  factory:\n    default: null\n' > ci-dask/zz-ci.yaml
          docker run -d --name nb -p 8888:8888 \
            -e DASK_CONFIG=/etc/dask \
            -v "$PWD/ci-dask:/etc/dask-ci:ro" \
            "${{ env.REGISTRY }}/coffea-casa/${{ matrix.image }}:${{ steps.tags.outputs.primarytag }}" \
            start-notebook.py --IdentityProvider.token='' --ServerApp.ip='0.0.0.0'
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8888/api > /dev/null && { echo "Server is up"; break; }
            [ "$i" = 60 ] && { echo "Server never came up"; docker logs nb; exit 1; }
            sleep 5
          done
          docker logs nb
          docker rm -f nb

      - name: Create kind cluster
        if: matrix.spawntest
        uses: helm/kind-action@v1
        with:
          cluster_name: cc-test

      - name: Install helm
        if: matrix.spawntest
        uses: azure/setup-helm@v4

      - name: Run z2jh spawn test
        if: matrix.spawntest
        run: |
          kind load docker-image "${{ env.REGISTRY }}/coffea-casa/${{ matrix.image }}:${{ steps.tags.outputs.primarytag }}" --name cc-test
          ./ci/spawn-test.sh "${{ env.REGISTRY }}/coffea-casa/${{ matrix.image }}:${{ steps.tags.outputs.primarytag }}"

      - name: Dump cluster state on failure
        if: failure() && matrix.spawntest
        run: |
          kubectl get pods -A -o wide || true
          kubectl describe pods -n jhub-ci || true
          kubectl logs -n jhub-ci -l component=hub --tail=300 || true
          kubectl logs -n jhub-ci -l component=singleuser-server --all-containers --tail=300 || true
          helm -n jhub-ci status jhub-ci || true
      # ----------------------------------------------------------------
      # Publish: only for push/release events, only if all tests passed.
      # Instant: every layer already in the GHA cache from the build above.
      # ----------------------------------------------------------------
      - name: Login to Harbor Hub
        if: success() && steps.tags.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: hub.opensciencegrid.org
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Push tested image
        if: success() && steps.tags.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker/
          file: docker/Dockerfile.${{ matrix.image }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.flavour }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            FLAVOUR=${{ matrix.flavour }}
            PYVER=${{ matrix.pyver }}
            TAG=${{ steps.tags.outputs.releasetag }}
            PROJECT=${{ env.PROJECT }}
            GITHUB_ACTIONS=true
            REGISTRY=${{ env.REGISTRY }}